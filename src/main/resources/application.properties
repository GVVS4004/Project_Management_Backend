# ===============================
# APPLICATION
# ===============================
# The name of your Spring Boot application - used for identification in logs and monitoring tools
spring.application.name=backend

# ===============================
# SERVER CONFIGURATION
# ===============================
# Port number where your backend server will run (default: 8080)
# Access your API at: http://localhost:8080
server.port=8080

# Context path - adds a prefix to all your API endpoints
# Example: Without this, endpoint would be /users
#          With this, endpoint becomes /api/users
# This helps distinguish API routes from other routes and follows REST best practices
server.servlet.context-path=/api

# ===============================
# DATABASE CONFIGURATION
# ===============================
# JDBC URL format: jdbc:postgresql://<host>:<port>/<database_name>
# This tells Spring where your PostgreSQL database is located
# Make sure the database 'taskmanagement_db' exists before running the app
# Uses environment variable DB_URL if set, otherwise defaults to localhost
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskmanagement_db}

# Database credentials
# SECURITY NOTE: Never commit real passwords to version control
# Uses environment variables if set, otherwise uses defaults (for local dev only)
# Override in application-local.properties or set environment variables
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Tells Spring which JDBC driver to use for PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# FLYWAY CONFIGURATION (Database Migrations)
# ===============================
# Flyway manages database schema changes through versioned SQL scripts
# This ensures all environments have the same database structure

# Enable Flyway migrations
spring.flyway.enabled=true

# Location of migration scripts (default: classpath:db/migration)
# Migration files must follow naming convention: V{version}__{description}.sql
# Example: V1__initial_schema.sql, V2__add_user_table.sql
spring.flyway.locations=classpath:db/migration

# Baseline version for existing databases
# If database already exists, Flyway starts from this version
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Validate migrations before running (checks for accidental changes)
spring.flyway.validate-on-migrate=true

# Clean database on validation errors (DANGEROUS - only for dev!)
# Set to false in production to prevent accidental data loss
spring.flyway.clean-disabled=false

# ===============================
# CONNECTION POOL CONFIGURATION (HikariCP)
# ===============================
# HikariCP is a high-performance JDBC connection pool
# Connection pools reuse database connections instead of creating new ones for each request
# This dramatically improves performance

# Maximum number of connections the pool can hold at once
# More connections = handle more concurrent users, but uses more memory
spring.datasource.hikari.maximum-pool-size=10

# Minimum number of idle connections HikariCP maintains in the pool
# Keeps connections ready for immediate use
spring.datasource.hikari.minimum-idle=5

# Maximum time (ms) to wait for a connection from the pool before timing out
# 20 seconds - if no connection available in 20s, throw exception
spring.datasource.hikari.connection-timeout=20000

# Maximum time (ms) a connection can sit idle in the pool before being removed
# 5 minutes - closes unused connections to free up resources
spring.datasource.hikari.idle-timeout=300000

# Maximum lifetime (ms) of a connection in the pool
# 20 minutes - prevents long-lived connections from having stale state
spring.datasource.hikari.max-lifetime=1200000

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# JPA (Java Persistence API) is the standard for ORM in Java
# Hibernate is the implementation we're using

# Show SQL queries in console - helpful for debugging
# Set to false in production for better performance
spring.jpa.show-sql=true

# Controls how Hibernate manages your database schema:
# - create: Drop and recreate tables on startup (DESTROYS DATA!)
# - create-drop: Create on startup, drop on shutdown (for testing)
# - update: Update schema if needed, keep existing data (GOOD FOR DEV)
# - validate: Only validate schema, don't change anything (GOOD FOR PROD)
# - none: Do nothing (use with Flyway/Liquibase in production)
# Using 'validate' because Flyway handles schema migrations
spring.jpa.hibernate.ddl-auto=validate

# Tells Hibernate which SQL dialect to use
# Different databases have different SQL syntax - this ensures compatibility
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Format SQL queries in console for better readability
# Makes it easier to debug complex queries
spring.jpa.properties.hibernate.format_sql=true

# Add comments to generated SQL showing which Java method triggered the query
# Helps trace SQL back to your code
spring.jpa.properties.hibernate.use_sql_comments=true

# Open Session In View (OSIV) pattern
# false = Session closes after service layer (RECOMMENDED)
# true = Session stays open until view renders (can cause lazy loading issues)
# Setting to false forces you to fetch all needed data in service layer
spring.jpa.open-in-view=false

# ===============================
# LOGGING CONFIGURATION
# ===============================
# Controls how much information gets logged
# Levels: TRACE < DEBUG < INFO < WARN < ERROR

# Root level - applies to all packages unless overridden
# INFO = log important information, warnings, and errors
logging.level.root=INFO

# DEBUG level for YOUR application code (change 'com.taskmanagement' to your package)
# Shows detailed logs from your own classes
logging.level.com.fullstack.backend=DEBUG

# DEBUG level for Spring Web - see HTTP requests/responses
# Useful for debugging controller issues
logging.level.org.springframework.web=DEBUG

# DEBUG level for Spring Security - see authentication/authorization flow
# Essential for debugging login/permission issues
logging.level.org.springframework.security=DEBUG

# Show the actual SQL queries Hibernate generates
logging.level.org.hibernate.SQL=DEBUG

# TRACE level to see the parameter values in SQL queries
# Shows what values are being bound to ? placeholders in queries
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Custom log pattern for console output
# Shows: timestamp - logger name - message
# Customize this to show what's important for your debugging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# ===============================
# JWT CONFIGURATION (Custom Properties)
# ===============================
# These are custom properties you'll read in your JWT utility class
# Not built-in Spring properties - you need to use @Value to inject them

# Secret key used to sign JWT tokens
# MUST be at least 256 bits (32 characters) for HS256 algorithm
# CRITICAL: Set JWT_SECRET environment variable in production
# Generate strong key: openssl rand -base64 32
# Default is ONLY for local development - NEVER use in production
jwt.secret=${JWT_SECRET:dev-secret-key-only-for-local-testing-change-in-production}

# JWT token expiration time in milliseconds
# 86400000 ms = 24 hours
# After this time, user must login again
jwt.expiration=${JWT_EXPIRATION:86400000}

# Refresh token expiration time in milliseconds
# 604800000 ms = 7 days
# Allows users to get new access tokens without re-login
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================
# Enable multipart file upload support (for image/file uploads)
spring.servlet.multipart.enabled=true

# Maximum size for a single uploaded file
# Prevents users from uploading huge files that could fill your disk
spring.servlet.multipart.max-file-size=25MB

# Maximum size for the entire multipart request
# Can include multiple files + other form data
spring.servlet.multipart.max-request-size=25MB

# Custom property: directory where uploaded files will be stored
# Relative path = creates folder in project directory
# Absolute path = /var/app/uploads (Linux) or C:/uploads (Windows)
#file.upload-dir=./uploads

# ===============================
# VALIDATION CONFIGURATION
# ===============================
# Throw exception when no handler found for a request (404)
# Instead of silently returning default error page
# Allows your global exception handler to catch 404s
spring.mvc.throw-exception-if-no-handler-found=true

# Disable default static resource mapping
# Works with above setting to ensure 404s are thrown properly
# If true, Spring tries to serve static files first
spring.web.resources.add-mappings=false

# ===============================
# ACTUATOR (Monitoring & Health Checks)
# ===============================
# Spring Boot Actuator provides production-ready features
# Endpoints for monitoring, metrics, health checks

# Expose specific actuator endpoints over HTTP
# health = check if app is running
# info = display app information
# metrics = show performance metrics
# Add more: env, beans, mappings (but be careful in production)
management.endpoints.web.exposure.include=health,info,metrics

# Control who can see detailed health information
# when-authorized = only authenticated users see details
# always = everyone sees details
# never = nobody sees details
management.endpoint.health.show-details=when-authorized

# ===============================
# ERROR HANDLING CONFIGURATION
# ===============================
# Include the error message in the response
# always = always include (good for dev)
# never = never include (more secure for production)
# on_param = only when 'message' param is present
server.error.include-message=always

# Include validation/binding errors in error response
# Shows which fields failed validation
server.error.include-binding-errors=always

# Include stack trace in error response
# on_param = only when 'trace=true' query param is present
# Good for dev: see full error without always showing it
# Production: set to 'never' to avoid exposing internal details
server.error.include-stacktrace=on_param

# Include exception class name in error response
# false = more secure, doesn't expose internal class structure
# true = helpful for debugging (but risky in production)
server.error.include-exception=false


# ===============================
# SWAGGER/OPENAPI CONFIGURATION
# ===============================
# Enable/disable Swagger UI (set to false in production for security)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Custom paths for Swagger UI and API docs
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Packages to scan for API documentation
springdoc.packages-to-scan=com.fullstack.backend.controller

# Sort endpoints alphabetically
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha

# Display request duration in Swagger UI
springdoc.swagger-ui.display-request-duration=true

# Try it out feature enabled by default
springdoc.swagger-ui.tryItOutEnabled=true

# Show common extensions
springdoc.show-actuator=false

